<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>TaskFlow</title>
    <meta name="description" content="Gerencie seus hábitos diários com inteligência. Acompanhe tarefas, streaks e desempenho." />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- PWA — theme & status bar -->
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f2ede8" media="(prefers-color-scheme: light)" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="TaskFlow" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Microsoft / Edge -->
    <meta name="msapplication-TileColor" content="#111111" />
    <meta name="msapplication-TileImage" content="/icons/icon-192.png" />

    <!-- Open Graph (share preview) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="TaskFlow" />
    <meta property="og:description" content="Gerencie seus hábitos diários com inteligência." />
    <meta property="og:image"       content="/icons/icon-512.png" />
  </head>
  <body>
    <!-- Kill any cached service worker immediately -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          regs.forEach(function(r) { r.unregister(); });
        });
        caches.keys().then(function(keys) {
          keys.forEach(function(k) { caches.delete(k); });
        });
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
