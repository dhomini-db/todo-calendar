<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="calClip">
      <rect x="4" y="4" width="120" height="120" rx="26"/>
    </clipPath>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="26" fill="#111111"/>

  <!-- Blue header -->
  <rect x="4" y="4" width="120" height="42" rx="26" fill="url(#headerGrad)" clip-path="url(#calClip)"/>
  <rect x="4" y="26" width="120" height="20" fill="url(#headerGrad)" clip-path="url(#calClip)"/>

  <!-- Subtle top shine -->
  <rect x="4" y="4" width="120" height="2" rx="1" fill="rgba(255,255,255,0.18)" clip-path="url(#calClip)"/>

  <!-- Binding tab — left -->
  <rect x="33" y="0" width="18" height="28" rx="9" fill="#1d4ed8"/>
  <rect x="35" y="2" width="14" height="20" rx="7" fill="#3b82f6"/>

  <!-- Binding tab — right -->
  <rect x="77" y="0" width="18" height="28" rx="9" fill="#1d4ed8"/>
  <rect x="79" y="2" width="14" height="20" rx="7" fill="#3b82f6"/>

  <!-- Date dot grid — row 1 -->
  <circle cx="30"  cy="68" r="4" fill="white" opacity="0.12"/>
  <circle cx="48"  cy="68" r="4" fill="white" opacity="0.12"/>
  <circle cx="66"  cy="68" r="4" fill="white" opacity="0.12"/>
  <circle cx="84"  cy="68" r="4" fill="white" opacity="0.12"/>
  <circle cx="102" cy="68" r="4" fill="white" opacity="0.12"/>

  <!-- Date dot grid — row 2 (today highlighted) -->
  <circle cx="30"  cy="86" r="4" fill="white" opacity="0.08"/>
  <circle cx="48"  cy="86" r="4" fill="white" opacity="0.08"/>
  <circle cx="66"  cy="86" r="5" fill="#3b82f6"/>
  <circle cx="84"  cy="86" r="4" fill="white" opacity="0.08"/>
  <circle cx="102" cy="86" r="4" fill="white" opacity="0.08"/>

  <!-- Status dots -->
  <circle cx="42"  cy="108" r="7" fill="#4ade80"/>
  <circle cx="64"  cy="108" r="7" fill="#fbbf24"/>
  <circle cx="86"  cy="108" r="7" fill="#f87171"/>
</svg>
