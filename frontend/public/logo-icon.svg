<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="calClip">
      <rect x="8" y="20" width="112" height="100" rx="14"/>
    </clipPath>
  </defs>

  <!-- Calendar body -->
  <rect x="8" y="20" width="112" height="100" rx="14" fill="#111111"/>

  <!-- Blue header (clipped to body shape) -->
  <rect x="8" y="20" width="112" height="38" fill="#3b82f6" clip-path="url(#calClip)"/>

  <!-- Header inner highlight (subtle top edge) -->
  <rect x="8" y="20" width="112" height="1.5" fill="rgba(255,255,255,0.15)" clip-path="url(#calClip)"/>

  <!-- Binding tab — left -->
  <rect x="34" y="7" width="16" height="26" rx="8" fill="#1d4ed8"/>
  <rect x="36" y="9" width="12" height="18" rx="6" fill="#3b82f6"/>

  <!-- Binding tab — right -->
  <rect x="78" y="7" width="16" height="26" rx="8" fill="#1d4ed8"/>
  <rect x="80" y="9" width="12" height="18" rx="6" fill="#3b82f6"/>

  <!-- Date dot grid — row 1 -->
  <circle cx="27"  cy="73" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="43"  cy="73" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="59"  cy="73" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="75"  cy="73" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="91"  cy="73" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="107" cy="73" r="3.5" fill="white" opacity="0.10"/>

  <!-- Date dot grid — row 2 (with "today" highlight) -->
  <circle cx="27"  cy="89" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="43"  cy="89" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="59"  cy="89" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="75"  cy="89" r="5"   fill="#3b82f6"/>
  <circle cx="91"  cy="89" r="3.5" fill="white" opacity="0.10"/>
  <circle cx="107" cy="89" r="3.5" fill="white" opacity="0.10"/>

  <!-- Status dots — score system (green / yellow / red) -->
  <circle cx="43"  cy="109" r="6" fill="#4ade80"/>
  <circle cx="64"  cy="109" r="6" fill="#fbbf24"/>
  <circle cx="85"  cy="109" r="6" fill="#f87171"/>
</svg>
