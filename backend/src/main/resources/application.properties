# ================================
# Datasource (sobrescrito por variáveis de ambiente no Docker)
# ================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/todocalendar}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate
# ================================
# update: cria/atualiza tabelas automaticamente. Em produção use 'validate' ou Flyway.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================
# Servidor
# ================================
server.port=8081
