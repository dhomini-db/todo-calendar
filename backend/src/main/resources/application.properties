# ================================
# Datasource
# ================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/todocalendar}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ================================
# JPA / Hibernate
# ================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ================================
# Servidor
# ================================
server.port=8081

# ================================
# JWT
# ================================
jwt.secret=${JWT_SECRET:todocalendar-secret-key-must-be-at-least-256-bits-long-for-hs256}

# ================================
# CORS
# ================================
# Origens separadas por vírgula. Em produção, defina ALLOWED_ORIGINS no ambiente.
# Exemplo: ALLOWED_ORIGINS=https://seu-app.vercel.app
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3001,http://localhost:5173}

# ================================
# Multipart (upload de imagens)
# ================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# ================================
# Anthropic / Claude AI
# ================================
# Set ANTHROPIC_API_KEY in the environment (local .env or Render/Railway secret).
# Leaving it blank disables AI features gracefully (returns "AI not configured").
anthropic.api.key=${ANTHROPIC_API_KEY:}
